name: Bot translation check

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest

    steps:
      - name: Parse command
        id: cmd
        shell: bash
        run: |
          body="${{ github.event.comment.body }}"
          if [[ "$body" =~ ^bot,\ check\ ([A-Za-z0-9._-]+\.json)\ *$ ]]; then
            echo "filename=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no command
        if: steps.cmd.outputs.ok != 'true'
        run: exit 0

      - name: Checkout base repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download checker
        run: |
          curl -L -o check_trad.py https://raw.githubusercontent.com/Lluciocc/vish-utils/main/check_trad.py

      - name: Get PR head SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = context.payload.issue.pull_request.url;
            const pr = await github.request(prUrl);
            core.setOutput("head_sha", pr.data.head.sha);
            core.setOutput("number", pr.data.number);

      - name: Download JSON from PR
        id: dl
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = `assets/models/${{ steps.cmd.outputs.filename }}`;
            const ref  = "${{ steps.pr.outputs.head_sha }}";

            const res = await github.rest.repos.getContent({ owner, repo, path, ref });

            if (Array.isArray(res.data)) {
              core.setFailed(`Path is a directory: ${path}`);
              return;
            }

            const buff = Buffer.from(res.data.content, res.data.encoding || "base64");
            const fs = require("fs");
            fs.writeFileSync("translation_to_check.json", buff.toString("utf8"));

            core.setOutput("path", path);

      - name: Run translation check
        run: |
          python check_trad.py assets/models/en.json translation_to_check.json

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const filePath = "${{ steps.dl.outputs.path }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `✅ Translation check passed for \`${filePath}\`.`
            });

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const filePath = "${{ steps.dl.outputs.path }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `❌ Translation check failed for \`${filePath}\`. See workflow logs for details.`
            });

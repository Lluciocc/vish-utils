name: Bot translation check

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest

    steps:
      - name: Parse command
        id: cmd
        shell: bash
        run: |
          body="${{ github.event.comment.body }}"
          if [[ "$body" =~ ^bot,\ check\ ([A-Za-z0-9._-]+\.json)\ *$ ]]; then
            echo "filename=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no command
        if: steps.cmd.outputs.ok != 'true'
        run: exit 0

      - name: Set vars
        shell: bash
        run: |
          echo "FILE_PATH=assets/models/${{ steps.cmd.outputs.filename }}" >> $GITHUB_ENV
          echo "RUN_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV

      - name: Comment started
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const filePath = process.env.FILE_PATH;
            const runUrl = process.env.RUN_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Started translation check for \`${filePath}\`.\n${runUrl}`
            });

      - name: Checkout base repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download checker
        run: |
          curl -fsSL --retry 5 --retry-all-errors -o check_trad.py https://raw.githubusercontent.com/Lluciocc/vish-utils/main/check_trad.py

      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("head_owner", pr.head.repo.owner.login);
            core.setOutput("head_repo", pr.head.repo.name);
            core.setOutput("number", pr.number);

      - name: Download JSON from PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          owner="${{ steps.pr.outputs.head_owner }}"
          repo="${{ steps.pr.outputs.head_repo }}"
          sha="${{ steps.pr.outputs.head_sha }}"
          path="${FILE_PATH}"
          url="https://raw.githubusercontent.com/${owner}/${repo}/${sha}/${path}"

          curl -fL --retry 5 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -o translation_to_check.json \
            "$url"

      - name: Run translation check
        run: |
          python check_trad.py assets/models/en.json translation_to_check.json

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const filePath = process.env.FILE_PATH;
            const runUrl = process.env.RUN_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Translation check passed for \`${filePath}\`.\n${runUrl}`
            });

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const filePath = process.env.FILE_PATH;
            const runUrl = process.env.RUN_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Translation check failed for \`${filePath}\`. See logs.\n${runUrl}`
            });
